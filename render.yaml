services:
  - type: web
    name: niace-app
    env: php
    region: singapore
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm ci
      npm run build
      php artisan config:clear
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: "THE NIACE"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://niace-app.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: niace-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: niace-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: niace-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: niace-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: niace-db
          property: password

databases:
  - name: niace-db
    databaseName: niace_db
    user: niace_user
    region: singapore
    plan: free
